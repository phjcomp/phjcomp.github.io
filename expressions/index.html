<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="영어 표현 학습 플래시카드">
  <title>English Expressions</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="study-page" id="studyPage">
    <!-- Header -->
    <header class="study-header">
      <span class="study-header__counter" id="counter">— / —</span>
      <a href="manage.html" class="study-header__link" id="manageLink">관리</a>
    </header>

    <!-- Flashcard -->
    <main class="flashcard" id="flashcard">
      <div class="flashcard__korean" id="koreanText"></div>
      <div class="flashcard__english" id="englishText"></div>
      <div class="flashcard__buttons">
        <button class="btn-speak" id="btnSpeak" title="듣기">🔊</button>
        <button class="btn-action" id="btnAction">정답확인</button>
      </div>
    </main>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-state__icon">📝</div>
    <div class="empty-state__text">
      아직 표현이 없습니다.<br>
      <a href="manage.html" class="empty-state__link">표현 추가하기</a>
    </div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
