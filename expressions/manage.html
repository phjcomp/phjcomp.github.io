<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="영어 표현 관리 — 추가 및 GitHub 동기화">
  <title>표현 관리 — English Expressions</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="manage-page">
    <!-- Header with Push Button -->
    <header class="manage-header">
      <div class="manage-header__title">
        표현 관리
        <a href="index.html">← 학습</a>
      </div>
      <button class="btn-push" id="btnPush" onclick="pushToGitHub()">
        🚀 Push to GitHub
      </button>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-group">
        <textarea
          class="input-group__textarea"
          id="inputText"
          placeholder="한국어영어 표현을 붙여넣으세요...&#10;예: 욕구를 채우다fulfill the desires유혹에 굴복하다be subjected to..."
        ></textarea>
        <button class="btn-add" id="btnAdd" onclick="parseAndPreview()">추가</button>
      </div>
    </section>



    <!-- Expression List -->
    <section class="expression-list-section" id="listSection">
      <div class="section-title">
        <span>전체 표현</span>
        <span class="section-title__count" id="totalCount">0개</span>
      </div>
      <ul class="expression-list" id="expressionList"></ul>
    </section>

    <!-- GitHub Token Setup -->
    <section class="token-section" id="tokenSection">
      <div class="token-section__title">⚙️ GitHub 설정</div>
      <div class="token-input-group">
        <input
          type="password"
          class="token-input"
          id="tokenInput"
          placeholder="Personal Access Token"
        >
        <button class="btn-token" onclick="saveToken()">저장</button>
        <button class="btn-token" onclick="toggleTokenVisibility()">👁</button>
      </div>
      <div class="token-status" id="tokenStatus"></div>
    </section>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal__title">표현 수정</div>
      <input class="modal__input modal__input--ko" id="editKo" placeholder="한국어">
      <input class="modal__input modal__input--en" id="editEn" placeholder="English">
      <div class="modal__actions">
        <button class="btn-modal" onclick="closeModal()">취소</button>
        <button class="btn-modal btn-modal--primary" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="manage.js?v=6"></script>
</body>
</html>
